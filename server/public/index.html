<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HabitFlow — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
<div class="auth-bg">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="icon">✅</span>
      <h1>HabitFlow</h1>
      <p>Track your daily habits. Stay consistent.</p>
    </div>

    <a href="/api/auth/google" class="btn-google">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </a>

    <div class="auth-divider"><span>or</span></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required/>
      </div>
      <p class="error-msg" id="errMsg"></p>
      <button type="submit" class="btn-primary" id="submitBtn">Sign In</button>
    </form>

    <p class="auth-footer">No account? <a href="/signup.html">Sign Up</a></p>
  </div>
</div>

<script src="/assets/js/api.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
  redirectIfAuth();

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('errMsg');
    err.classList.remove('show');
    btn.disabled = true; btn.textContent = 'Signing in...';

    try {
      const data = await AuthAPI.login({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      });
      setToken(data.token);
      setUser(data.user);
      toast(`Welcome back, ${data.user.name}! 👋`);
      setTimeout(() => window.location.href = '/dashboard.html', 500);
    } catch (error) {
      err.textContent = error.message;
      err.classList.add('show');
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
